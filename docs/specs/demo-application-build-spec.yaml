# OSAC fullstack demo — implementation specification (agent-executable)
# Purpose: Single checklist to implement the entire production-oriented demo application
# under Projects/osac from the specs in this directory. Read FLOW-INDEX.yaml first.
#
# Non-goal: Replacing FLOW-INDEX or ui-flows content; this file orchestrates implementation.

version: 1
id: osac-fullstack-demo-implementation
title: Implement OSAC demo monorepo from docs/specs

agent:
  role: fullstack_implementer
  read_order:
    - file: FLOW-INDEX.yaml
      why: Canonical catalog of UI flows (flows[].id, flows[].file) and reusable UI components.
    - file: design-system.yaml
      why: PatternFly 6 packages, layout shell, tokens, theming, a11y, and logical-to-PF component mapping.
    - file: demo-application-build-spec.yaml
      why: This file — build order, gates, and constraints.
    - glob: ui-flows/*.yaml
      why: Per-flow steps, states, and transitions; implement only flows listed in FLOW-INDEX.
    - file: backend-fulfillment.yaml
      why: Public/private REST alignment, capabilities, events, console; BFF proxy and mock targets.

  notes:
    - >-
      **Implementation target** for all new code is Projects/osac (pnpm monorepo with **apps/**
      and **libs/**, similar to flightctl-ui). UX intent is fully specified by FLOW-INDEX.yaml
      and the ui-flows/ files in this directory only; **visual implementation** follows **design-system.yaml**
      (PatternFly 6 — packages, tokens, shell layout, accessibility).
    - >-
      **libs/** hold shared packages (config, contracts, UI kit); **apps/** hold runnable
      applications (BFF, SPA, E2E). All deployable runtime apps for the demo ship in **one
      container image** (BFF process + embedded SPA build); libs are not separate deployables.
    - >-
      **Workspaces only (pnpm)** are required for linking apps ↔ libs. **Turborepo is optional**:
      prefer root `package.json` scripts that compose `pnpm --filter <pkg> run <script>` or
      `pnpm -r run <script>` when the task graph is small; add Turborepo only if remote cache
      or a large DAG clearly repays its operational cost.
    - >-
      **Vite (or any SPA dev server/bundler) is optional**: pick the **smallest** toolchain that
      meets the gates (dev server, production static bundle consumed by the BFF, TypeScript,
      React). Do not mandate Vite in implementation plans unless it is needed for Storybook or
      team velocity.

goal: >
  Deliver a shippable OSAC demo application: React SPA + Fastify BFF, OpenAPI-driven contracts,
  Vitest and Cypress gates, and OpenShift-style deploy manifests, such that every user-visible
  journey maps to a FLOW-INDEX flow id and honors backend-fulfillment.yaml for HTTP semantics
  (with documented BFF mocks where fulfillment or private API is not yet wired).

code_target:
  monorepo_root: Projects/osac
  monorepo_layout:
    style: apps-and-libs
    rationale: >-
      Match flightctl-ui-style separation: **apps/** for runnable/deployable workspaces,
      **libs/** for shared libraries depended on by apps via the workspace protocol (pnpm).
  libs:
    description: Shared packages; consumed by apps; not standalone container images.
    paths:
      - libs/config
      - libs/api-contracts
      - libs/ui-components
  apps:
    description: >-
      Runnable applications. For production, **one container** runs the BFF (apps/app-backend)
      and serves the static bundle produced from apps/app-frontend at image build time.
    paths:
      - apps/app-backend
      - apps/app-frontend
      - apps/e2e
  workspace_globs:
    - apps/*
    - libs/*
  toolchain:
    workspaces: pnpm
    turborepo: optional
    turborepo_guidance: >-
      Default to **no** Turborepo: wire `build`, `test`, `lint`, and `dev` at the repo root with
      plain pnpm filters / recursive scripts. Introduce `turbo.json` only when incremental builds
      or shared caching are worth maintaining.
    spa_bundler: optional
    spa_bundler_guidance: >-
      Vite, Rspack, Webpack, esbuild CLI, or other bundlers are all acceptable if they emit static
      assets for `apps/app-backend` to serve. Prefer the **fewest moving parts** that still support
      React 18+, TypeScript strict mode, and Storybook for `libs/ui-components` (Storybook may bring
      its own Vite/Webpack builder without forcing the app bundle to use the same tool).
  reference_servers:
    - path: Projects/osac-ui/server/index.js
      use_for: CSP, auth/session patterns, static + API same-origin style, health endpoints.

spec_hierarchy:
  ui_catalog:
    source: FLOW-INDEX.yaml
    rule: >-
      Do not add user journeys, routes, or Cypress specs for flows not registered under
      flows[] in FLOW-INDEX. New UX requires a new flows[] entry and a ui-flows/*.yaml file.
  ui_detail:
    source: ui-flows/*.yaml
    rule: Implement screens, modals, and transitions to match step ids and cross-flow notes.
  design_system:
    source: design-system.yaml
    rule: >-
      Implement all new UI with PatternFly 6 (@patternfly/react-core ^6 and aligned packages).
      Use PF layout primitives for shell pages, design tokens for spacing and semantic styling,
      and meet accessibility rules in that file; map FLOW-INDEX reusable component names per flow_component_mapping.
  api_contract:
    source: backend-fulfillment.yaml
    rule: >-
      BFF and client use public REST shapes under /api/fulfillment/v1 (and documented
      capabilities/events/console). Cross-check UI data_requirements sections in that file.

security_and_network:
  browser_must_not:
    - Call fulfillment private REST (/api/private/v1) directly from the browser bundle.
  bff_may:
    - Mock private (and public gap) endpoints with proto-shaped JSON until real integration exists.
    - Document each mock in package README and/or OpenAPI x-mock style metadata.

implementation_phases:
  - id: phase-01-workspace
    name: Workspace and shared config
    tasks:
      - Add pnpm workspace root (package.json, pnpm-workspace.yaml with apps/* and libs/*, lockfile). Do **not** require Turborepo.
      - Add root scripts (or a thin Makefile) that orchestrate libs and apps via `pnpm --filter` / `pnpm -r` as needed.
      - Add libs/config (eslint, prettier, tsconfig base) consumed by all TS apps and libs.
    gates:
      - pnpm install succeeds at monorepo root.
      - pnpm exec eslint --version (or project lint script) runs from root.

  - id: phase-02-contracts
    name: API contracts and codegen
    tasks:
      - Add libs/api-contracts with fulfillment-aligned OpenAPI (public surface primary).
      - Mark operations that are mocked in BFF (gaps vs merged fulfillment, private mocks).
      - Generate typed clients or fetch wrappers for apps/app-backend and apps/app-frontend.
    gates:
      - OpenAPI validates; codegen runs in CI without drift.

  - id: phase-03-bff
    name: BFF and fulfillment integration
    tasks:
      - >-
        Fastify app in apps/app-backend — proxy to FULFILLMENT_API_URL when set.
      - Register mock handlers for same paths where upstream or private integration is absent.
      - Align security headers and auth bridging with osac-ui server patterns.
      - Serve production SPA from app-backend in prod mode; expose /health (and /ready if used).
      - Image build copies prebuilt assets from apps/app-frontend into the BFF app artifact so **one container** serves API + static UI.
    gates:
      - Vitest unit + HTTP integration tests pass with inject() or supertest.
      - BFF starts with mock-only and with proxy to a test double URL.

  - id: phase-04-ui-library
    name: Shared PatternFly 6 components
    tasks:
      - >-
        In libs/ui-components, depend on @patternfly/patternfly, @patternfly/react-core, @patternfly/react-icons,
        and @patternfly/react-table at **^6.0.0** (see design-system.yaml packages).
      - >-
        Implement reusable surfaces named in FLOW-INDEX reusable_components_across_flows (PageShell, Masthead,
        Table, Wizard, etc.) per design-system.yaml flow_component_mapping.
      - Storybook stories for primary states; use @storybook/addon-a11y and fix critical violations on primary stories.
    gates:
      - Storybook build succeeds; at least one story per major reusable surface used by flows.

  - id: phase-05-frontend
    name: Application shell and flows
    tasks:
      - >-
        apps/app-frontend — React, React Router, TanStack Query; same-origin API to BFF.
        Bundler/dev server is **implementation choice** (see code_target.toolchain.spa_bundler_guidance).
        Depends on libs/ui-components (and optionally generated types from libs/api-contracts).
        Shell, forms, and tables follow **design-system.yaml** (PatternFly 6 page layout, tokens, a11y).
      - Map routing and feature modules to FLOW-INDEX flows[].id (welcome, auth, shell, dashboards,
        catalog, wizard, VMs, activities, admin, console demo).
      - Respect cross_flow_entry_points and canonical_step_ids for navigation and deep links.
      - RTL tests for critical components/pages.
    gates:
      - pnpm build produces static assets consumable by apps/app-backend (single deploy image).
      - No orphan routes: each primary route traces to a flows[].id.

  - id: phase-06-e2e
    name: Cypress E2E
    tasks:
      - >-
        apps/e2e or apps/app-frontend/cypress — baseUrl against dev stack; critical journeys.
      - Tag or name specs after flows[].id where possible for traceability.
    gates:
      - Cypress headless passes in CI against BFF + mocks (or documented compose stack).

  - id: phase-07-deploy
    name: Deploy manifests
    tasks:
      - deploy/dev and deploy/integration under Projects/osac mirroring osac-ui parameter names
        (FULFILLMENT_API_URL, KEYCLOAK_*, OIDC_CLIENT_ID, NAMESPACE, PORT, LOG_LEVEL, etc.).
      - Containerfile builds **one image** from the monorepo (BFF + embedded SPA); probes on /health; Service/Route/RBAC consistent with osac-ui shape.
    gates:
      - Manifests validate (kubectl dry-run client if available); documented env contract.

traceability:
  convention: >-
    Use FLOW-INDEX flows[].id as stable identifiers in analytics, E2E describe blocks, and
    feature flags. When a flow file lists a step id, preserve that id in code comments or
    route meta for future audits.
  flow_ids_must_implement:
    source: FLOW-INDEX.yaml key flows
    note: All entries under flows[] are in scope for the demo unless explicitly deferred in README with product sign-off (prefer not to defer; shrink FLOW-INDEX instead).

acceptance_checklist:
  - Every shipped primary UI path is listed under FLOW-INDEX flows[] and implemented per its ui-flows file.
  - Shipped UI follows design-system.yaml (PatternFly 6, tokens, shell layout, documented a11y expectations).
  - HTTP behavior matches backend-fulfillment.yaml for public operations the UI uses; mocks documented for gaps/private.
  - Browser never calls private fulfillment REST; private only via BFF (real or mocked).
  - pnpm test (Vitest) and Cypress E2E pass in CI.
  - Deploy manifests keep ConfigMap key parity with Projects/osac-ui/deploy for shared operator vocabulary.
  - Monorepo uses apps/* and libs/*; production delivers a single container running the BFF with the SPA bundle baked in.
  - Orchestration uses **pnpm workspaces** without requiring Turborepo unless justified; SPA build does not require Vite unless justified.

out_of_scope_for_this_spec:
  - Porting flightctl-ui Go proxy literally.
  - Changing fulfillment-service upstream protos (track in backend-fulfillment.yaml only).

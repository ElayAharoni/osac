id: welcome-and-role-selection
title: Welcome and Role Selection Statechart
source_flow: ../ui-flows/welcome-and-role-selection.yaml
rbac_ref: ../rbac.yaml

context:
  role: null
  tenantId: null
  browserTarget: same_tab
  osacEntry: null
  theme: light

initial: wrs_welcome_landing

states:
  wrs_welcome_landing:
    permissions:
      - choose_persona
      - use_theme_toggle
    on:
      ENTER_PROVIDER_ADMIN:
        target: wrs_role_selected_pre_auth
        guard: can(role, "choose_persona")
      OPEN_ORG_USER_NEW_TAB:
        target: auth_sign_in_form
        guard: can(role, "choose_persona")
      OPEN_ORG_ADMIN_NEW_TAB:
        target: auth_sign_in_form
        guard: can(role, "choose_persona")
      TOGGLE_THEME:
        target: wrs_welcome_landing
        guard: can(role, "use_theme_toggle")

  wrs_role_selected_pre_auth:
    permissions:
      - choose_persona
    on:
      ROUTE_TO_SIGN_IN:
        target: auth_sign_in_form
        guard: can(role, "choose_persona")

  auth_sign_in_form:
    external: institutional-sign-in.statechart.yaml#auth_sign_in_form

ai-hints:
  summary: >-
    Entry machine for persona and tenant bootstrap. Provider Admin uses same-tab route through
    wrs_role_selected_pre_auth. Tenant user/admin paths open a new tab and continue at auth_sign_in_form.
  impossibleStates:
    - role=providerAdmin with browserTarget=new_tab
    - role=tenantUser and tenantId=vertexa
